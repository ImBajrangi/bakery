    <style>
        body { font-family: 'Quicksand', 'Spline Sans', sans-serif; }
        .text-shadow-brutal { text-shadow: 4px 4px 0px #f6557b; }
        .blob-shape { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
        .blob-mask { border-radius: 43% 57% 70% 30% / 30% 30% 70% 70%; }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .animate-float { animation: float 6s ease-in-out infinite; }
        .animate-float-delayed { animation: float 7s ease-in-out infinite 2s; }
        .polaroid { transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .polaroid:hover { transform: rotate(0deg) translateY(-8px); box-shadow: 12px 12px 0px #A7E8D0; }
        .btn-squish:active { transform: scaleY(0.9) translateY(4px); box-shadow: 4px 4px 0px #f6557b; }
        .filter-pill { transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .filter-pill[aria-selected="true"] {
            background-color: #A7E8D0;
            transform: translateX(8px);
            box-shadow: 4px 4px 0px #f6557b;
        }
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: #FFF6D9; border-left: 4px solid #4A2E2B; }
        ::-webkit-scrollbar-thumb { background: #f6557b; border: 4px solid #4A2E2B; border-radius: 9999px; }
        @keyframes pulse-pink {
            0%, 100% { background-color: #f6557b; opacity: 0.5; }
            50% { background-color: #FFF6D9; opacity: 0.8; }
        }
        .skeleton-bg { animation: pulse-pink 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
    </style>

                                    <button className="flex-1 h-14 bg-background-light border-heavy rounded-full font-display text-lg uppercase hover:bg-accent transition-colors flex items-center justify-center gap-2">
                                        <span className="material-symbols-outlined text-primary">payments</span> UPI
                                    </button>
                                    <button className="flex-1 h-14 bg-background-light border-heavy rounded-full font-display text-lg uppercase hover:bg-accent transition-colors flex items-center justify-center gap-2">
                                        <span className="material-symbols-outlined text-primary">credit_card</span> Card
                                    </button>
                                    <button className="flex-1 h-14 bg-background-light border-heavy rounded-full font-display text-lg uppercase hover:bg-accent transition-colors flex items-center justify-center gap-2">
                                        <span className="material-symbols-outlined text-primary">local_shipping</span> COD
                                    </button>
                                </div>
                                <button onClick={handleOrder} className="w-full h-16 mt-2 bg-accent text-text-main font-display text-2xl uppercase rounded-full border-heavy shadow-[6px_6px_0px_#4A2E2B] hover:bg-primary hover:text-white transition-all">
                                    Place Order! 🍰
                                </button>
                            </div>
                        </div>
                    </section>
                </main>
            );
        };

        // --- Main App ---

        const App = () => {
            const [cartCount, setCartCount] = useState(3);
            const location = useLocation();

            useEffect(() => {
                window.scrollTo(0, 0);
            }, [location]);

            return (
                <div className="flex flex-col min-h-screen">
                    <Header cartCount={cartCount} />
                    <Routes>
                        <Route path="/" element={<HomePage />} />
                        <Route path="/menu" element={<MenuPage />} />
                        <Route path="/story" element={<StoryPage />} />
                        <Route path="/cart" element={<CartPage />} />
                    </Routes>
                    <Footer />
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(
            <MemoryRouter>
                <App />
            </MemoryRouter>
        );
    </script>
</body>
</html>
